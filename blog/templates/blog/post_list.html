<!DOCTYPE html>
<html>
    <head>
        <title>Marko's Blog</title>
    </head>
    <body>
        <header>
            <h1><a href="/">Marko's Blog</a></h1>
        </header>

        {% for post in posts %}
            <article>
                <p>Published: {{ post.published_date }}</p>
                <h2><a href="">{{ post.title }}</a></h2>
                <p>{{ post.text|linebreaksbr }}</p>
            </article>
        {% endfor %}
    </body>
</html>

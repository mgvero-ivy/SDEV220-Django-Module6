{% extends 'blog/base.html' %}

{% block content %}
    <article class="post">
        {% if post.published_date %}
            <p class="date">
                Published: {{ post.published_date }}
            </p>
        {% endif %}

        <a href="{% url 'post_edit' pk=post.pk %}">Edit post</a>

        <h2>{{ post.title }}</h2>
        <p>{{ post.text|linebreaksbr }}</p>
    </article>
{% endblock %}

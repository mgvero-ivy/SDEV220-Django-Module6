{% extends 'blog/base.html' %}

{% block content %}
    <h2>Login</h2>

    {% if form.errors %}
        <p>Your username and password did not match. Please try again.</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
{% endblock %}
